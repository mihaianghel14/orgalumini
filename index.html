<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#050505">
    <link rel="manifest" href="manifest.json">
    <title>Orga de lumini Pro</title>
    <style>
        body { 
            background: #050505; 
            color: white; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            margin: 0; 
            padding: 10px; 
            overflow: hidden; 
            touch-action: none; 
        }
        canvas { 
            width: 95vw; 
            height: auto; 
            max-width: 800px; 
            border-radius: 15px; 
            background: #000; 
            box-shadow: 0 0 30px rgba(0,0,0,0.5); 
            margin-top: 20px;
        }
        .controls { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 15px; 
            width: 95%; 
            max-width: 500px;
            margin-top: 20px; 
            background: #111; 
            padding: 15px; 
            border-radius: 12px; 
        }
        .control-group { display: flex; flex-direction: column; align-items: center; }
        label { font-size: 12px; color: #888; margin-bottom: 8px; font-weight: bold; letter-spacing: 1px; }
        input[type=range] { width: 100%; height: 30px; cursor: pointer; }
        
        #startBtn { 
            margin-top: 25px; 
            padding: 18px 40px; 
            background: #222; 
            color: #fff; 
            border: 2px solid #444; 
            border-radius: 10px; 
            font-size: 18px;
            font-weight: bold; 
            width: 90%; 
            max-width: 400px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: all 0.3s;
        }
        #startBtn:active { transform: scale(0.95); background: #333; }
    </style>
</head>
<body>
    <canvas id="canvas" width="800" height="300"></canvas>
    
    <div class="controls">
        <div class="control-group"><label>BASS</label><input type="range" id="gB" min="1" max="20" value="8"></div>
        <div class="control-group"><label>MID</label><input type="range" id="gM" min="1" max="40" value="20"></div>
        <div class="control-group"><label>HIGH</label><input type="range" id="gT" min="1" max="200" value="100"></div>
        <div class="control-group"><label>SILENCE</label><input type="range" id="gS" min="1" max="10" value="5"></div>
    </div>

    <button id="startBtn">START ANALYZER</button>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const btn = document.getElementById('startBtn');
        let curR = [10, 10, 10, 10];
        const fallSpeed = 0.07;

        // Înregistrare Service Worker pentru PWA/APK
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(err => console.log("SW error", err));
        }

        btn.onclick = async () => {
            try {
                // 1. Cerem permisiunea pentru microfon
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                
                // 2. Inițializăm contextul audio (fix pentru Chrome/Samsung)
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                const audioCtx = new AudioContext();
                
                // 3. IMPORTANT pentru A52s: Forțăm activarea contextului
                if (audioCtx.state === 'suspended') {
                    await audioCtx.resume();
                }

                const source = audioCtx.createMediaStreamSource(stream);
                const analyser = audioCtx.createAnalyser();
                analyser.fftSize = 1024;
                source.connect(analyser);
                
                const data = new Uint8Array(analyser.frequencyBinCount);
                
                // Ascundem butonul după activare
                btn.style.display = 'none';

                function draw() {
                    requestAnimationFrame(draw);
                    analyser.getByteFrequencyData(data);
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    
                    // Procesare benzi frecvență
                    let bVal = (data.slice(0, 10).reduce((a, b) => a + b) / 10) * document.getElementById('gB').value;
                    let mVal = (data.slice(10, 100).reduce((a, b) => a + b) / 90) * document.getElementById('gM').value;
                    let tPeak = Math.max(...data.slice(100, 500));
                    let tVal = tPeak * (document.getElementById('gT').value / 50);
                    let sVal = Math.max(0, (160 - ((bVal + mVal + tVal)/3)) * (document.getElementById('gS').value/5));

                    const targets = [bVal/2, mVal/2, tVal/2, sVal/2];
                    const colors = ['#ff4444', '#ffff44', '#44ff44', '#4444ff'];

                    targets.forEach((target, i) => {
                        let tr = Math.min(Math.max(5, target), 85);
                        // Efect de cădere lină a discurilor
                        if (tr > curR[i]) curR[i] = tr; 
                        else curR[i] -= (curR[i] - tr) * fallSpeed;

                        // Desenare discuri strălucitoare
                        ctx.shadowBlur = curR[i] * 0.8; 
                        ctx.shadowColor = colors[i];
                        ctx.beginPath(); 
                        ctx.arc(100 + (i * 200), 150, curR[i], 0, Math.PI * 2);
                        ctx.fillStyle = colors[i]; 
                        ctx.fill();
                    });
                }
                draw();
            } catch (err) {
                console.error(err);
                alert("Eroare: Aplicația are nevoie de permisiune pentru microfon. Verifică setările Android pentru acest APK.");
            }
        };
    </script>
</body>
</html>
