<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0a0c0a">
    <title>Kashtan VFD Pro</title>
    <style>
        body { background: #1a1c1a; color: #78a890; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; margin: 0; padding: 10px; overflow: hidden; touch-action: none; }
        .vfd-container { background: #0a0c0a; padding: 15px; border-radius: 10px; border: 3px solid #333; box-shadow: 0 0 30px rgba(0,0,0,0.8); width: 95vw; max-width: 600px; box-sizing: border-box; }
        .odometer { display: flex; background: #050505; padding: 5px; border: 2px solid #222; margin-bottom: 15px; height: 30px; }
        .digit-container { position: relative; width: 20px; height: 30px; overflow: hidden; }
        .digit-strip { display: flex; flex-direction: column; align-items: center; transition: transform 0.4s cubic-bezier(0.23, 1, 0.32, 1); }
        .digit-strip span { height: 30px; line-height: 30px; font-size: 20px; color: #4ecdc4; font-family: monospace; }
        canvas { background: #080a08; width: 100%; height: auto; border-radius: 4px; }
        .controls { margin-top: 15px; background: #222; padding: 15px; border-radius: 10px; width: 90vw; max-width: 400px; }
        #startBtn { margin-top: 15px; padding: 20px; width: 90vw; max-width: 400px; background: #2d3e2d; color: #78a890; border: 2px solid #4a634a; border-radius: 8px; font-weight: bold; font-size: 1.2rem; cursor: pointer; }
    </style>
</head>
<body>
    <div class="odometer" id="odometer">
        <div class="digit-container" id="d4"><div class="digit-strip"><span>0</span><span>1</span><span>2</span><span>3</span><span>4</span><span>5</span><span>6</span><span>7</span><span>8</span><span>9</span></div></div>
        <div class="digit-container" id="d3"><div class="digit-strip"><span>0</span><span>1</span><span>2</span><span>3</span><span>4</span><span>5</span><span>6</span><span>7</span><span>8</span><span>9</span></div></div>
        <div class="digit-container" id="d2"><div class="digit-strip"><span>0</span><span>1</span><span>2</span><span>3</span><span>4</span><span>5</span><span>6</span><span>7</span><span>8</span><span>9</span></div></div>
        <div class="digit-container" id="d1"><div class="digit-strip"><span>0</span><span>1</span><span>2</span><span>3</span><span>4</span><span>5</span><span>6</span><span>7</span><span>8</span><span>9</span></div></div>
        <div class="digit-container" id="d0"><div class="digit-strip"><span>0</span><span>1</span><span>2</span><span>3</span><span>4</span><span>5</span><span>6</span><span>7</span><span>8</span><span>9</span></div></div>
    </div>
    <div class="vfd-container"><canvas id="canvas" width="600" height="220"></canvas></div>
    <div class="controls">
        <label style="font-size: 10px; color: #666;">SENSITIVITY</label>
        <input type="range" id="masterGain" min="1" max="100" value="40" style="width:100%">
    </div>
    <button id="startBtn">START SYSTEM</button>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const btn = document.getElementById('startBtn');
        let startTime = null;
        let peakL = 0, peakR = 0;
        const gravity = 0.4;

        function updateOdometer() {
            if (!startTime) return;
            let seconds = Math.floor((Date.now() - startTime) / 1000);
            let sStr = seconds.toString().padStart(5, '0');
            for (let i = 0; i < 5; i++) {
                const el = document.getElementById('d' + (4-i));
                if(el) el.querySelector('.digit-strip').style.transform = `translateY(-${parseInt(sStr[i]) * 30}px)`;
            }
        }

        btn.onclick = async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                const audioCtx = new AudioContext();
                if (audioCtx.state === 'suspended') await audioCtx.resume();

                startTime = Date.now();
                setInterval(updateOdometer, 1000);

                const source = audioCtx.createMediaStreamSource(stream);
                const analyserL = audioCtx.createAnalyser();
                const analyserR = audioCtx.createAnalyser();
                const splitter = audioCtx.createChannelSplitter(2);
                source.connect(splitter);
                splitter.connect(analyserL, 0);
                splitter.connect(analyserR, 1);

                const dataL = new Uint8Array(analyserL.frequencyBinCount);
                const dataR = new Uint8Array(analyserR.frequencyBinCount);
                btn.style.display = 'none';

                function draw() {
                    requestAnimationFrame(draw);
                    analyserL.getByteFrequencyData(dataL);
                    analyserR.getByteFrequencyData(dataR);
                    let gain = document.getElementById('masterGain').value / 10;
                    let vL = (dataL.reduce((a,b)=>a+b)/dataL.length) * gain;
                    let vR = (dataR.reduce((a,b)=>a+b)/dataR.length) * gain;

                    ctx.fillStyle = "#080a08";
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    
                    // Efect scanline VFD
                    ctx.fillStyle = "rgba(255,255,255,0.02)";
                    for(let i=0; i<canvas.height; i+=4) ctx.fillRect(0, i, canvas.width, 1);

                    [vL, vR].forEach((v, i) => {
                        let y = i === 0 ? 55 : 155;
                        if (i === 0) peakL = v > peakL ? v : peakL - gravity;
                        else peakR = v > peakR ? v : peakR - gravity;
                        let cur = i === 0 ? peakL : peakR;

                        for (let j = 0; j < 18; j++) {
                            ctx.fillStyle = j < (cur/5) ? (j > 13 ? "#ffc832" : "#78a890") : "#111";
                            ctx.shadowBlur = j < (cur/5) ? 10 : 0;
                            ctx.shadowColor = j > 13 ? "#ffc832" : "#78a890";
                            ctx.fillRect(200 + (j * 20), y, 12, 30);
                        }
                    });
                }
                draw();
            } catch (e) { alert("Acces microfon refuzat!"); }
        };
    </script>
</body>
</html>
